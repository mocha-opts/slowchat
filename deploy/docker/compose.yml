name: slowchat

services:
  postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: im
      POSTGRES_PASSWORD: im_dev_password
      POSTGRES_USER: im_app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U im_app -d im"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  redis-realtime:
    image: redis:8.6-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "--user", "im_realtime", "--pass", "realtime_dev_password", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "6379:6379"
    volumes:
      - redis-realtime-data:/data
      - ./redis-realtime.conf:/usr/local/etc/redis/redis.conf:ro
      - ./redis-realtime.users.acl:/usr/local/etc/redis/users.acl:ro

  redis-jobs:
    image: redis:8.6-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "--user", "im_jobs", "--pass", "jobs_dev_password", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "6380:6379"
    volumes:
      - redis-jobs-data:/data
      - ./redis-jobs.conf:/usr/local/etc/redis/redis.conf:ro
      - ./redis-jobs.users.acl:/usr/local/etc/redis/users.acl:ro

  rabbitmq:
    image: rabbitmq:4.2-management-alpine
    environment:
      RABBITMQ_DEFAULT_PASS: rabbit_dev_password
      RABBITMQ_DEFAULT_USER: im_app
      RABBITMQ_DEFAULT_VHOST: /im
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 3s
      timeout: 5s
      retries: 30
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_PASSWORD: minio_dev_password
      MINIO_ROOT_USER: im_minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 3s
      retries: 30
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  minio-data:
  postgres-data:
  rabbitmq-data:
  redis-jobs-data:
  redis-realtime-data:
